name: Sync Telegram Mirror

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/sync.yml"
      - "config/channels.json"
      - "ops/sync-trigger.json"
      - "scripts/**"
      - "requirements.txt"

permissions:
  contents: write

concurrency:
  group: telegram-pages-mirror-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Ensure FFmpeg
        shell: bash
        run: |
          if ! command -v ffmpeg >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y ffmpeg
          fi
          ffmpeg -version | head -n 1

      - name: Build multi-channel site index
        run: node scripts/build_site_index.mjs

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit shared site artifacts if changed
        shell: bash
        run: |
          git add -A -- docs/data/channels docs/manifest.webmanifest
          if git diff --cached --quiet; then
            echo "No shared artifact changes."
          else
            git commit -m "chore: refresh shared site artifacts [skip ci]"
          fi

      - name: Sync configured Telegram channels progressively
        id: sync_channels
        shell: bash
        env:
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_SESSION_STR: ${{ secrets.TELEGRAM_SESSION_STR }}
          TG_ENABLE_SUPERRES: "0"
        run: |
          set +e
          rm -rf .sync-results
          mkdir -p .sync-results
          : > sync.log
          status=0
          mapfile -t channel_keys < <(node -e "const fs=require('fs'); const config=JSON.parse(fs.readFileSync('config/channels.json','utf8')); for (const channel of config.channels) console.log(channel.key);")

          for channel_key in "${channel_keys[@]}"; do
            channel_key="${channel_key//$'\r'/}"
            if [ -z "$channel_key" ]; then
              continue
            fi

            echo "=== Progressive publish for $channel_key ===" | tee -a sync.log
            node scripts/sync_one_channel.mjs --channel "$channel_key" --result-path ".sync-results/$channel_key.json" 2>&1 | tee -a sync.log
            channel_status=${PIPESTATUS[0]}

            if [ "$channel_status" -ne 0 ]; then
              status=1
              git restore --source=HEAD --staged --worktree -- "docs/data/channels/$channel_key" 2>/dev/null || true
              if [ -d "docs/channels/$channel_key" ]; then
                git restore --source=HEAD --staged --worktree -- "docs/channels/$channel_key" 2>/dev/null || true
              fi
              git clean -fd -- "docs/data/channels/$channel_key" 2>/dev/null || true
              if [ -d "docs/channels/$channel_key" ]; then
                git clean -fd -- "docs/channels/$channel_key" 2>/dev/null || true
              fi
              continue
            fi

            git add -A -- "docs/data/channels/$channel_key"
            if [ -d "docs/channels/$channel_key" ]; then
              git add -A -- "docs/channels/$channel_key"
            fi

            if git diff --cached --quiet; then
              echo "No publishable changes for $channel_key." | tee -a sync.log
              continue
            fi

            git commit -m "chore: refresh telegram mirror ($channel_key) [skip ci]" 2>&1 | tee -a sync.log
            commit_status=${PIPESTATUS[0]}
            if [ "$commit_status" -ne 0 ]; then
              status=1
              break
            fi

          done

          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Write sync report
        if: always()
        run: node scripts/write_sync_report.mjs .sync-results

      - name: Write sync failure report
        if: always()
        run: node scripts/write_sync_failure_report.mjs "${{ steps.sync_channels.outputs.exit_code }}"

      - name: Show sync diagnostics
        if: always()
        continue-on-error: true
        run: |
          git status --short
          python scripts/print_sync_diagnostics.py

      - name: Commit sync reports if changed
        if: always()
        shell: bash
        run: |
          report_paths=("docs/data/sync-report.json")
          if [ -e "docs/data/sync-failure.json" ] || git ls-files --error-unmatch "docs/data/sync-failure.json" >/dev/null 2>&1; then
            report_paths+=("docs/data/sync-failure.json")
          fi

          git add -A -- "${report_paths[@]}"
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "chore: update sync reports [skip ci]"
          fi

      - name: Push accumulated sync commits
        if: always()
        shell: bash
        run: |
          if [ -z "$(git rev-list --max-count=1 origin/main..HEAD)" ]; then
            echo "No local sync commits to push."
            exit 0
          fi

          if ! git diff --quiet || ! git diff --cached --quiet; then
            echo "Tracked changes remain before final push."
            git status --short
            exit 1
          fi

          git pull --rebase origin main
          git push

      - name: Fail job if sync failed
        if: steps.sync_channels.outputs.exit_code != '0'
        run: exit 1
