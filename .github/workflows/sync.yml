name: Sync Telegram Mirror

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/sync.yml"
      - "config/channels.json"
      - "ops/sync-trigger.json"
      - "scripts/**"
      - "requirements.txt"

permissions:
  contents: write

concurrency:
  group: telegram-pages-mirror-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Ensure FFmpeg
        shell: bash
        run: |
          if ! command -v ffmpeg >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y ffmpeg
          fi
          ffmpeg -version | head -n 1

      - name: Build multi-channel site index
        run: node scripts/build_site_index.mjs

      - name: Sync configured Telegram channels
        id: sync_channels
        shell: bash
        env:
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_SESSION_STR: ${{ secrets.TELEGRAM_SESSION_STR }}
          TG_ENABLE_SUPERRES: "0"
        run: |
          set +e
          node scripts/sync_channels.mjs 2>&1 | tee sync.log
          status=${PIPESTATUS[0]}
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Write sync failure report
        if: always()
        run: node scripts/write_sync_failure_report.mjs "${{ steps.sync_channels.outputs.exit_code }}"

      - name: Show sync diagnostics
        if: always()
        continue-on-error: true
        run: |
          git status --short
          python scripts/print_sync_diagnostics.py

      - name: Commit and push if changed
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A -- docs/data docs/manifest.webmanifest
          if [ -d docs/channels ]; then
            git add -A -- docs/channels
          fi
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "chore: refresh telegram mirror [skip ci]"
            git pull --rebase origin main
            git push
          fi

      - name: Fail job if sync failed
        if: steps.sync_channels.outputs.exit_code != '0'
        run: exit 1
