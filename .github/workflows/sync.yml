name: Sync Telegram Mirror

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/sync.yml"
      - "config/channels.json"
      - "scripts/**"
      - "requirements.txt"

permissions:
  contents: write

concurrency:
  group: telegram-pages-mirror-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build multi-channel site index
        run: node scripts/build_site_index.mjs

      - name: Sync configured Telegram channels
        env:
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_SESSION_STR: ${{ secrets.TELEGRAM_SESSION_STR }}
        run: node scripts/sync_channels.mjs

      - name: Show sync diagnostics
        if: always()
        run: |
          git status --short
          python - <<'PY'
          import json
          from pathlib import Path

          base = Path("docs/data/channels")
          for posts_path in sorted(base.glob("*/posts.json")):
              try:
                  payload = json.loads(posts_path.read_text("utf-8"))
              except Exception as error:
                  print(f"{posts_path}: failed to read ({error})")
                  continue

              generated_at = payload.get("generated_at")
              total_posts = payload.get("pagination", {}).get("total_posts")
              print(f"{posts_path}: generated_at={generated_at}, total_posts={total_posts}")
          PY

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data docs/channels docs/manifest.webmanifest
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "chore: refresh telegram mirror [skip ci]"
            git pull --rebase origin main
            git push
          fi
